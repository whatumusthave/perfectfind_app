<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Paw Match - Game Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --card-radius: 28px;
            --zio-main: #001f3f;
            --zio-soft: #e0f7fa;
            --zia-main: #ffb6c1;
            --zia-soft: #fff0f3;
        }

        /* 점선 제거 및 고급스러운 실선 보정 */
        .item-placeholder {
            border: 2px solid rgba(255, 255, 255, 0.8) !important;
            background: rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
            border-radius: var(--card-radius) !important;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px !important;
        }

        .item-placeholder:hover {
            transform: scale(1.05);
            background: white !important;
        }

        .item-placeholder img {
            width: 85%;
            height: auto;
            object-fit: contain;
        }

        /* 캐릭터 배너 컬러 매칭 최적화 */
        .zio-banner {
            background: var(--zio-soft) !important;
            border: 3px solid #b2ebf2 !important;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-radius: 30px;
        }

        .zia-banner {
            background: var(--zia-soft) !important;
            border: 3px solid #ffdde1 !important;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-radius: 30px;
        }

        .main-img {
            width: 160px !important;
            height: 160px !important;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }

        .mini-pose {
            width: 60px !important;
            height: 60px !important;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .item-modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            margin-top: 25px;
            background: var(--zio-main);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
        }
    </style>
</head>

<body class="game-page">
    <div id="app-wrapper">
        <header class="premium-header">
            <h1 class="premium-logo">Perfect Paw Match 🐾</h1>
        </header>

        <main class="game-container">
            <div class="character-banners">
                <div class="char-banner zio-banner glass">
                    <img src="assets/zio-cat-emo-pose.png" class="mini-pose">
                    <div class="main-pose-box"><img src="assets/zio.png" alt="Zio Main" class="main-img">
                        <h3>Zio Cat</h3>
                    </div>
                </div>
                <div class="char-banner zia-banner glass">
                    <div class="main-pose-box"><img src="assets/zia.png" alt="Zia Main" class="main-img">
                        <h3>Zia Cat</h3>
                    </div>
                    <img src="assets/zia-cat-emo-pose.png" class="mini-pose">
                </div>
            </div>

            <section class="item-grid-section">
                <div class="items-grid" id="items-grid">
                    <div class="item-placeholder glass"
                        onclick="showInfo('Golden Paw', 'A symbol of divine luck and the ultimate treasure of the cat kingdom.')">
                        <img src="assets/Golden_Paw.png">
                        <div class="item-name-label">Golden Paw</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Indigo Bowtie', 'A hand-crafted luxury accessory that grants the wearer unparalleled elegance.')">
                        <img src="assets/Indigo_Bowtie.png">
                        <div class="item-name-label">Indigo Bowtie</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Fuchsia Ribbon', 'Zia\'s prized possession, woven from starlight and silken dreams.')">
                        <img src="assets/Fuchsia_Ribbon.png">
                        <div class="item-name-label">Fuchsia Ribbon</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="itemModal" class="modal-overlay" onclick="closeModal()">
        <div class="item-modal" onclick="event.stopPropagation()">
            <h2 id="modalTitle">Item Name</h2>
            <p id="modalDesc">Description</p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function showInfo(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('itemModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('itemModal').style.display = 'none'; }
    </script>
</body>

</html>
