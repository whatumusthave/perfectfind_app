<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Paw Match - Game Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Gowun+Dodum&display=swap"
        rel="stylesheet">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .item-modal {
            background: white;
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--zia-primary);
        }

        .item-modal h2 {
            color: var(--zio-primary);
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .item-modal p {
            color: var(--text-main);
            line-height: 1.8;
            font-size: 1rem;
            opacity: 0.9;
        }

        .close-btn {
            margin-top: 25px;
            background: var(--zio-primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
        }

        .item-name-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--zio-primary);
            margin-top: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .item-placeholder {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            transition: 0.3s;
        }

        .item-placeholder:hover {
            transform: scale(1.05);
        }

        .item-placeholder img {
            width: 80%;
            height: auto;
            margin-bottom: 5px;
        }
    </style>
</head>

<body class="game-page">
    <div id="app-wrapper">
        <header class="premium-header">
            <h1 class="premium-logo">Perfect Paw Match 🐾</h1>
            <div class="stat-item glass"><span class="label">SCORE</span><span id="current-score"
                    class="value">0000</span></div>
        </header>

        <main class="game-container">
            <div class="character-banners">
                <div class="char-banner zio-banner glass">
                    <div class="sub-poses left">
                        <img src="assets/zio_awe.png" alt="감탄" class="mini-pose"><img src="assets/zio_pleading.png"
                            alt="애원" class="mini-pose">
                    </div>
                    <div class="main-pose-box"><img src="assets/zio_tucked.png" alt="Zio Main" class="main-img">
                        <h3>Zio Cat</h3>
                    </div>
                    <div class="sub-poses right">
                        <img src="assets/zio_hiding.png" alt="숨기" class="mini-pose"><img src="assets/zio_playing.png"
                            alt="놀기" class="mini-pose">
                    </div>
                </div>

                <div class="char-banner zia-banner glass">
                    <div class="sub-poses left">
                        <img src="assets/zia_yarn.png" alt="실뭉치" class="mini-pose"><img src="assets/zia_rolling.png"
                            alt="구르기" class="mini-pose">
                    </div>
                    <div class="main-pose-box"><img src="assets/zia_sitting.png" alt="Zia Main" class="main-img">
                        <h3>Zia Cat</h3>
                    </div>
                    <div class="sub-poses right">
                        <img src="assets/zia_stretching.png" alt="기지개" class="mini-pose"><img
                            src="assets/zia_curious.png" alt="궁금" class="mini-pose">
                    </div>
                </div>
            </div>

            <section class="item-grid-section">
                <div class="items-grid" id="items-grid">
                    <div class="item-placeholder glass"
                        onclick="showInfo('Golden Paw', 'A symbol of divine luck and the ultimate treasure of the cat kingdom.')">
                        <img src="assets/Golden_Paw.png" alt="1">
                        <div class="item-name-label">Golden Paw</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Indigo Bowtie', 'A hand-crafted luxury accessory that grants the wearer unparalleled elegance.')">
                        <img src="assets/Indigo_Bowtie.png" alt="2">
                        <div class="item-name-label">Indigo Bowtie</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Fuchsia Ribbon', 'Zia\'s prized possession, woven from starlight and silken dreams.')">
                        <img src="assets/Fuchsia_Ribbon.png" alt="3">
                        <div class="item-name-label">Fuchsia Ribbon</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Crystal Ball', 'A mystical orb that reveals hidden patterns in the cosmic puzzle.')">
                        <img src="assets/Crystal_Ball.png" alt="4">
                        <div class="item-name-label">Crystal Ball</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Silver Bag', 'Contains infinite surprises from the most exclusive boutiques in DTLA.')">
                        <img src="assets/Silver_Shopping_Bag.png" alt="5">
                        <div class="item-name-label">Silver Bag</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Royal Bed', 'A velvet throne designed for the highest level of feline relaxation.')">
                        <img src="assets/Royal_Cat_Bed.png" alt="6">
                        <div class="item-name-label">Royal Bed</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Celestial Potion', 'A glowing elixir that boosts your matching speed with lunar energy.')">
                        <img src="assets/Celestial_Potion.png" alt="7">
                        <div class="item-name-label">Celestial Potion</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Starry Mic', 'For the feline who dreams of becoming a galactic pop sensation.')">
                        <img src="assets/Starry_Cat_Mic.png" alt="8">
                        <div class="item-name-label">Starry Mic</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Amethyst Heart', 'A rare gem that symbolizes the deep bond between Zio and Zia.')">
                        <img src="assets/Amethyst_Heart.png" alt="9">
                        <div class="item-name-label">Amethyst Heart</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Midnight Cushion', 'An enchanted pillow that allows cats to travel through dreams.')">
                        <img src="assets/Midnight_Cushion.png" alt="10">
                        <div class="item-name-label">Midnight Cushion</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Sapphire Paw', 'A cool, calming talisman that guides cats through the darkest nights.')">
                        <img src="assets/Sapphire_Paw.png" alt="11">
                        <div class="item-name-label">Sapphire Paw</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Starlight Yarn', 'An endless ball of yarn that glows brighter the more it is played with.')">
                        <img src="assets/Starlight_Yarn_Ball.png" alt="12">
                        <div class="item-name-label">Starlight Yarn</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Jeweled Key', 'The entrance to the secret vault where legendary treats are kept.')">
                        <img src="assets/Jeweled_Keyhole.png" alt="13">
                        <div class="item-name-label">Jeweled Key</div>
                    </div>
                    <div class="item-placeholder glass"
                        onclick="showInfo('Emerald Fish', 'A quirky, shimmering companion that brings joy to every match.')">
                        <img src="assets/Emerald_Pufferfish.png" alt="14">
                        <div class="item-name-label">Emerald Fish</div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="game-footer"><a href="index.html" class="back-button glass">Return to Lobby</a></footer>
    </div>

    <div id="itemModal" class="modal-overlay" onclick="closeModal()">
        <div class="item-modal" onclick="event.stopPropagation()">
            <h2 id="modalTitle">Item Name</h2>
            <p id="modalDesc">상세 설명</p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function showInfo(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('itemModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('itemModal').style.display = 'none'; }
    </script>
</body>

</html>
