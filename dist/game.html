<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Paw Match - Game Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="game-page">
    <div id="app-wrapper">
        <header class="premium-header">
            <div class="logo-area">
                <h1 class="premium-logo">Perfect Paw Match 🐾</h1>
            </div>
            <div class="stats-area">
                <div class="stat-item glass">
                    <span class="label">SCORE</span>
                    <span id="current-score" class="value">0000</span>
                </div>
            </div>
        </header>

        <main class="game-container">
            <div class="character-banners">
                <div class="char-banner zio-banner glass">
                    <img src="https://lh3.googleusercontent.com/aida/ADBb0ujD-ItvD--xA3x-dWrUq_4TrItvB97WodtPzLG2lK_o-EbCr1-kO2TFjDf_N1Gjt6Vrdoa36TiLhZB9Cn04H-YJa7GA-VoIypUkK8Y6HiWVtn1cRW_miJPLGnF_wZrNV_ipBW0vbnLlwPV6ZVP3J_IhJ2Z1Bks5UbGA9afTk13wJewcTZbyE2lqmJMRl-9cuK1BZLpPMYHa7Tc80S0L8dDSwn3qb8COZX-U1GGHtPCZ9D5PjUm4mg-E2kM" alt="Zio">
                    <h3>Zio Cat</h3>
                </div>
                <div class="char-banner zia-banner glass">
                    <img src="https://lh3.googleusercontent.com/aida/ADBb0ujxTqG7xDoeXfooiY5GJxdHEMM5Xyi1G6uugfXLNK_X2bUj7WGumZs0e1iGAr86Ktvpq5cVAQw50Gw2qjfxtK3aKXhBoiapyb__k5nrVov-hev2ygVzICML6MZxDm47Y9PH3QyoQUL8NcpPKXd0f10WlyjcH4o71PbbzXb_HQYLXhepYnWTp8UHmqWM8ivi_FBlulgqH72WSbtNb5-BPO8UOpyzaZVGfqbXt-dlZP2zz_vIbSWQ0CIpINA" alt="Zia">
                    <h3>Zia Cat</h3>
                </div>
            </div>

            <!-- 14 Card Placeholders Grid -->
            <section class="item-grid-section">
                <h3>Collectible Items (14 Icons)</h3>
                <div class="items-grid" id="items-grid">
                    <!-- 14 Placeholders -->
                    <div class="item-placeholder glass" data-id="1"><span>Item 1</span></div>
                    <div class="item-placeholder glass" data-id="2"><span>Item 2</span></div>
                    <div class="item-placeholder glass" data-id="3"><span>Item 3</span></div>
                    <div class="item-placeholder glass" data-id="4"><span>Item 4</span></div>
                    <div class="item-placeholder glass" data-id="5"><span>Item 5</span></div>
                    <div class="item-placeholder glass" data-id="6"><span>Item 6</span></div>
                    <div class="item-placeholder glass" data-id="7"><span>Item 7</span></div>
                    <div class="item-placeholder glass" data-id="8"><span>Item 8</span></div>
                    <div class="item-placeholder glass" data-id="9"><span>Item 9</span></div>
                    <div class="item-placeholder glass" data-id="10"><span>Item 10</span></div>
                    <div class="item-placeholder glass" data-id="11"><span>Item 11</span></div>
                    <div class="item-placeholder glass" data-id="12"><span>Item 12</span></div>
                    <div class="item-placeholder glass" data-id="13"><span>Item 13</span></div>
                    <div class="item-placeholder glass" data-id="14"><span>Item 14</span></div>
                </div>
            </section>
        </main>

        <footer class="game-footer">
            <a href="index.html" class="back-button glass">Return to Lobby</a>
        </footer>
    </div>
</body>
</html>
