<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Perfect Paw Match</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="policy-page">
    <div class="policy-container glass" style="text-align: center; padding: 60px 40px;">
        <div class="success-icon">✨✨🐈</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your purchase. Your digital assets are now unlocked.</p>
        
        <div class="content" style="margin-top: 40px;">
            <p>A confirmation email has been sent to your Stripe email address.</p>
            <div style="margin-top: 40px; gap: 15px; display: flex; flex-direction: column; align-items: center;">
                <button onclick="window.location.href='game.html'" style="width: 100%; max-width: 300px;">Enter the Game</button>
                <a href="index.html" class="back-link" style="margin-top: 10px;">Return to Home</a>
            </div>
        </div>

        <div class="info-section glass" style="margin-top: 50px; grid-template-columns: 1fr;">
            <p style="font-size: 0.85rem; opacity: 0.7;">Having trouble? Contact support at <a href="mailto:perfectgiftfind@gmail.com">perfectgiftfind@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
